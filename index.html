<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#5B7A3D">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="畑日記">
  <meta name="description" content="畑の作業記録・管理アプリ">

  <title>畑仕事記録</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<div id="app">

  <!-- Top Header -->
  <header id="top-header">
    <button id="menu-btn" aria-label="メニューを開く">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div id="app-title">🌿 畑仕事記録</div>
  </header>

  <!-- Sidebar Overlay -->
  <div id="sidebar-overlay" aria-hidden="true"></div>

  <!-- Sidebar -->
  <nav id="sidebar" role="navigation" aria-label="メインメニュー">
    <div id="sidebar-header">
      <span id="sidebar-icon">🌿</span>
      <span id="sidebar-header-title">畑仕事記録</span>
    </div>
    <div id="sidebar-nav">
      <!-- Rendered by JS -->
    </div>
  </nav>

  <!-- Main Content -->
  <main id="main-content" role="main">
    <div class="page-loading">起動中…</div>
  </main>

</div>

<!-- Toast -->
<div id="toast" role="status" aria-live="polite"></div>

<script src="js/db.js"></script>
<script src="js/app.js"></script>
<script>
  // Service Worker registration
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW registration failed:', err));
    });
  }
</script>

</body>
</html>
