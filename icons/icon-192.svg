<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="32" fill="#5B7A3D"/>
  <g fill="#FFFFFF">
    <!-- stem -->
    <rect x="91" y="100" width="10" height="50" rx="5"/>
    <!-- leaf left -->
    <ellipse cx="72" cy="90" rx="22" ry="13" transform="rotate(-30 72 90)" fill="#A5D06A"/>
    <!-- leaf right -->
    <ellipse cx="120" cy="90" rx="22" ry="13" transform="rotate(30 120 90)" fill="#A5D06A"/>
    <!-- sprout top -->
    <ellipse cx="96" cy="72" rx="14" ry="20" fill="#FFFFFF"/>
    <!-- sprout inner -->
    <ellipse cx="96" cy="74" rx="8" ry="14" fill="#A5D06A"/>
    <!-- soil line -->
    <rect x="55" y="148" width="82" height="8" rx="4" fill="#8B6914"/>
  </g>
</svg>
